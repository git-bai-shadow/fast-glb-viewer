<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB 模型查看器 (终极修复版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }
        #error { color: #ff4444; margin-top: 10px; font-size: 0.9em; max-width: 80%; word-break: break-all; }
    </style>

    <!-- 依然使用 ESM.sh 保证库文件加载 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0/build/three.module.js",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="loading">
    <div id="status">正在初始化...</div>
    <div id="error"></div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- 1. 核心逻辑：获取 URL 参数 ---
    function getTargetUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let target = urlParams.get('url');

        if (!target) {
            showError("未提供模型链接。请在网址后添加 ?url=你的模型地址");
            return null;
        }

        // 修复双重编码问题：如果链接里包含 %2F，说明被编码了，需要还原
        if (target.includes('%2F') || target.includes('%3A')) {
            try {
                target = decodeURIComponent(target);
                console.log("已自动修复编码:", target);
            } catch (e) {
                console.error("解码失败", e);
            }
        }
        return target;
    }

    const modelUrl = getTargetUrl();
    if (!modelUrl) {
        // 如果没有链接，停止执行
        document.getElementById('status').innerText = "等待链接...";
        throw new Error("No URL provided");
    }

    // --- 2. 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 5, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // 控制器
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- 3. 代理加载逻辑 ---
    // 我们构建代理链接： /api/proxy?url=原始链接
    const proxyUrl = `/api/proxy?url=${encodeURIComponent(modelUrl)}`;

    document.getElementById('status').innerText = "正在通过代理下载模型...";

    const loader = new GLTFLoader();

    // 关键点：我们加载的是 代理链接，而不是原始链接
    loader.load(
        proxyUrl,
        function (gltf) {
            scene.add(gltf.scene);
            document.getElementById('loading').style.display = 'none';
            animate();
        },
        function (xhr) {
            const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
            document.getElementById('status').innerText = `下载中: ${percent}%`;
        },
        function (error) {
            console.error('加载错误', error);
            showError("加载失败: " + error.message);
        }
    );

    // --- 4. 渲染循环 ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    function showError(msg) {
        const errDiv = document.getElementById('error');
        errDiv.innerText = msg;
        document.getElementById('status').innerText = "出错了";
    }

    // 窗口自适应
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>
