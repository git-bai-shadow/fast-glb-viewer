<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLB 模型查看器</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #222;
        color: white;
        font-family: sans-serif;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #fff;
        border-top: 4px solid #333;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <!-- Import Map: 使用 esm.sh 加速 -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0/build/three.module.js",
          "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div id="status">正在加载模型...</div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      // --- 1. 获取 URL 参数 ---
      const urlParams = new URLSearchParams(window.location.search);
      let modelUrl = urlParams.get("url");

      const statusText = document.getElementById("status");

      if (!modelUrl) {
        statusText.innerHTML = "错误：未提供模型 URL";
        throw new Error("Missing URL parameter");
      }

      // --- 2. 关键修复：解码 URL ---
      // 这一步是为了解决 %2F %3F 乱码问题
      try {
        modelUrl = decodeURIComponent(modelUrl);
        console.log("解码后的模型地址:", modelUrl);
      } catch (e) {
        console.warn("解码失败，尝试使用原始地址");
      }

      // --- 3. 构建代理地址 ---
      // 使用我们部署在 Vercel 上的 /api/proxy
      const proxyUrl = `/api/proxy?url=${encodeURIComponent(modelUrl)}`;
      console.log("最终请求的代理地址:", proxyUrl);

      // --- 4. 初始化 Three.js ---
      const scene = new THREE.Scene();
      // 添加环境光
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambientLight);
      // 添加方向光
      const dirLight = new THREE.DirectionalLight(0xffffff, 2);
      dirLight.position.set(5, 10, 7.5);
      scene.add(dirLight);

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 5); // 初始位置

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      // 开启阴影（如果需要）
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; // 惯性拖拽

      // --- 5. 加载模型 ---
      const loader = new GLTFLoader();

      // 使用 fetch 先检查代理是否通畅（可选，用于调试）
      // 这里直接加载
      loader.load(
        proxyUrl,
        (gltf) => {
          // 加载成功
          document.getElementById("loading").style.display = "none";

          const model = gltf.scene;
          scene.add(model);

          // 自动适配模型大小和位置
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());

          const maxDim = Math.max(size.x, size.y, size.z);
          const fov = camera.fov * (Math.PI / 180);
          let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
          cameraZ *= 1.5; // 多留一点空间
          camera.position.set(center.x, center.y, center.z + cameraZ);

          controls.target.copy(center);
          controls.update();

          // 添加网格地面（如果模型没有地面）
          if (maxDim > 10) {
            const grid = new THREE.GridHelper(maxDim * 2, 20, 0x888888, 0x444444);
            grid.position.y = box.min.y;
            scene.add(grid);
          }
        },
        (xhr) => {
          // 加载进度
          const percent = (xhr.loaded / xhr.total) * 100;
          statusText.innerText = `加载中: ${Math.round(percent)}%`;
        },
        (error) => {
          // 加载失败
          console.error("加载错误:", error);
          statusText.innerHTML = `加载失败: ${error.message || "未知错误"}`;
          alert("模型加载失败。请检查控制台网络面板，看 proxy 是否返回 500 或 403。");
        }
      );

      // --- 6. 渲染循环 ---
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // 窗口自适应
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
