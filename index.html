<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB 模型查看器 (代理修复版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #888; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; }
    </style>
</head>
<body>
    <div id="info">GLB 查看器 (Proxy Mode)</div>
    <div id="loading">加载中...</div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // 1. 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('url');

        // 默认模型（如果没有传参）
        if (!modelUrl) {
            modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf';
        }

        // 2. 【核心逻辑】如果链接是外部的，强制走 Vercel 代理
        // 这里的逻辑是：如果链接包含 http 且不是你自己域名的，就套一层 /api/proxy
        if (modelUrl.startsWith('http') && !modelUrl.includes(window.location.hostname)) {
            // 必须使用 encodeURIComponent，否则链接里的 & 符号会把参数截断
            modelUrl = '/api/proxy?url=' + encodeURIComponent(modelUrl);
            console.log('👉 检测到跨域，已启用代理:', modelUrl);
        }

        // 3. 初始化 Three.js 场景
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);

        // 加载模型
        const loader = new GLTFLoader();
        const loadingElem = document.getElementById('loading');

        loader.load(
            modelUrl,
            function (gltf) {
                loadingElem.style.display = 'none';
                scene.add(gltf.scene);

                // 自动适配模型大小和位置
                const box = new THREE.Box3().setFromObject(gltf.scene);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);

                camera.position.set(center.x, center.y, center.z + maxDim * 1.5);
                controls.target.copy(center);
                controls.update();

            },
            function (xhr) {
                // 加载进度
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            function (error) {
                // 【报错处理】
                loadingElem.innerText = '加载失败！';
                console.error(error);
                alert('加载失败: ' + error.message + '\n请检查控制台网络面板');
            }
        );

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
