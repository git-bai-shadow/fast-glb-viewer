<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D模型查看器</title>
  <script src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js" type="module"></script>
  <style>
    body, html { margin:0; padding:0; height:100%; background:#111; overflow:hidden; }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(#222, #000);
    }
  </style>
</head>
<body>
  <model-viewer 
    id="viewer"
    src=""
    alt="Meshy 3D Model"
    auto-rotate
    rotation-per-second="30deg"
    camera-controls
    shadow-intensity="1.2"
    shadow-softness="0.8"
    exposure="0.8"
    environment-image="neutral"
    ar
    ar-modes="webxr scene-viewer quick-look"
    touch-action="pan-y"
    style="background-color: #1a1a1a;">
  </model-viewer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let modelUrl = urlParams.get('url');
    
    if (modelUrl) {
      // 支持直接传未编码的URL（容错处理）
      if (!modelUrl.startsWith('http')) {
        modelUrl = decodeURIComponent(modelUrl);
      }
      document.getElementById('viewer').src = modelUrl;
    } else {
      document.body.innerHTML = '<h2 style="color:white;text-align:center;margin-top:20%">缺少 url 参数</h2>';
    }
  </script>
</body>
</html>
