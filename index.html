<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速 GLB 查看器 (国内优化版)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #loading { position: absolute; top: 20px; }
    </style>
    <!-- 使用国内更友好的 CDN 或者 jsDelivr (它对中国用户优化较好) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">加载中...</div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        // 添加网格地面
        const gridHelper = new THREE.GridHelper(10, 10);
        scene.add(gridHelper);

        // 添加环境光和方向光
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 3, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.5, 0);
        controls.update();

        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 核心逻辑修改 ---
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('url');

        if (modelUrl) {
            // 1. 如果 URL 包含 http，我们将其通过 Vercel 的代理转发
            // 这样浏览器请求的是我们自己域名的 /api/proxy/...，从而避免跨域问题
            if (modelUrl.startsWith('http')) {
                modelUrl = '/api/proxy/' + modelUrl;
            }

            const loader = new GLTFLoader();
            loader.load(
                modelUrl,
                (gltf) => {
                    scene.add(gltf.scene);
                    document.getElementById('loading').style.display = 'none';

                    // 自动调整模型大小和位置
                    const box = new THREE.Box3().setFromObject(gltf.scene);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);

                    gltf.scene.position.sub(center); // 居中
                    const scale = 2 / maxDim;
                    gltf.scene.scale.set(scale, scale, scale);

                    controls.target.y = size.y / 2 * scale;
                    controls.update();
                },
                undefined,
                (error) => {
                    console.error('加载错误:', error);
                    document.getElementById('loading').innerText = '模型加载失败，可能是跨域限制或链接失效';
                }
            );
        } else {
            document.getElementById('loading').innerText = '请在 URL 后添加 ?url=模型地址';
        }

        animate();
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
