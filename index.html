<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速 GLB 查看器</title>
    <style>body { margin: 0; overflow: hidden; background: #222; }</style>
    <!-- 使用 Import Map 引入 Three.js，比传统 script 标签加载更快 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. 初始化场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222); // 深灰背景
        
        // 2. 初始化相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 3); // 相机位置

        // 3. 初始化渲染器 (开启抗锯齿和阴影)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 4. 灯光 (让模型更有质感)
        const ambientLight = new THREE.AmbientLight(0xffffff, 2); // 环境光
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2); // 平行光
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 5. 控制器 (鼠标交互)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 开启阻尼惯性，手感更好

        // 6. 核心逻辑：从 URL 获取 GLB 地址并加载
        const loader = new GLTFLoader();
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('url');

        if (modelUrl) {
            loader.load(modelUrl, (gltf) => {
                const model = gltf.scene;
                scene.add(model);
                // 自动居中模型
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center); 
            }, undefined, (error) => {
                console.error('模型加载失败:', error);
                alert('模型加载失败，请检查 URL 是否正确或是否存在跨域问题');
            });
        } else {
            alert('请在网址后添加 ?url=你的模型地址');
        }

        // 7. 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 8. 窗口大小自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
