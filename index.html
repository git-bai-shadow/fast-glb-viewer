<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB 极速查看器</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>

    <!-- 使用国内 BootCDN 加速 Three.js 加载 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.bootcdn.net/ajax/libs/three.js/0.160.0/three.module.js",
                "three/addons/": "https://cdn.bootcdn.net/ajax/libs/three.js/0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">模型加载中，请稍候...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. 获取 URL 中的模型地址
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('url');

        if (!modelUrl) {
            document.getElementById('loading').innerText = "错误：请在 URL 后加上 ?url=你的模型地址";
            throw new Error("Missing URL parameter");
        }

        // 处理 URL 编码问题
        if (!modelUrl.startsWith('http')) {
            modelUrl = decodeURIComponent(modelUrl);
        }

        // 2. 初始化场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 2);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 3. 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 5, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 4. 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 5. 核心修复：使用 Fetch + Blob 绕过跨域限制
        // 普通 loader.load 会因为跨域报错，我们先用 fetch 拿到数据流
        fetch(modelUrl)
            .then(response => {
                if (!response.ok) throw new Error("网络响应失败");
                return response.blob(); // 将数据转为二进制大对象
            })
            .then(blob => {
                const blobUrl = URL.createObjectURL(blob); // 在浏览器本地创建一个临时网址
                const loader = new GLTFLoader();
                loader.load(
                    blobUrl,
                    (gltf) => {
                        scene.add(gltf.scene);
                        document.getElementById('loading').style.display = 'none';
                        // 自动适配模型大小和位置
                        fitCameraToObject(camera, controls, gltf.scene);
                    },
                    undefined,
                    (error) => {
                        console.error(error);
                        document.getElementById('loading').innerText = "模型解析失败";
                    }
                );
            })
            .catch((err) => {
                console.error(err);
                document.getElementById('loading').innerText = "加载失败：可能是链接失效或服务器禁止下载";
            });

        // 6. 自动适配视角函数
        function fitCameraToObject(camera, controls, object) {
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            cameraZ *= 1.5; // 多留一点空隙

            camera.position.set(center.x, center.y, center.z + cameraZ);
            camera.lookAt(center);

            controls.target.copy(center);
            controls.update();
        }

        // 7. 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
