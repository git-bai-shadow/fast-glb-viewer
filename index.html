<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB 极速查看器 (修复版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; pointer-events: none; z-index: 100; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; }
    </style>

    <!-- 使用 esm.sh 导入 Three.js，这是一个非常稳定的 CDN，自动处理依赖 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">GLB 查看器 (修复版)</div>
    <div id="loading">加载中...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // 1. 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('url');

        if (!modelUrl) {
            document.getElementById('loading').innerText = "错误：请在 URL 后添加 ?url=模型地址";
            throw new Error("Missing URL parameter");
        }

        // 2. 初始化场景
        const scene = new THREE.Scene();
        // 添加一点环境雾，让模型边缘融合得更好
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // 3. 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 惯性阻尼
        controls.dampingFactor = 0.05;

        // 4. 灯光 (使用 HDRI 环境光效果更好，这里为了简单先用基础光)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // 添加地面网格辅助（可选，如果不想要可以注释掉）
        const gridHelper = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
        scene.add(gridHelper);

        // 5. 加载模型的核心逻辑 (解决跨域的关键)
        const loader = new GLTFLoader();
        const loadingText = document.getElementById('loading');

        // 尝试直接加载
        // 如果直接加载报 CORS 错，现代浏览器在某些配置下会自动 fallback，
        // 或者你可以尝试在 URL 前加一个 CORS 代理前缀（如 corsproxy.io/?），但这不稳定。
        // 这里我们直接用标准方式尝试。

        loader.load(
            modelUrl,
            function (gltf) {
                // 成功加载
                const model = gltf.scene;

                // 自动调整模型大小和位置
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim; // 缩放到合适大小
                model.scale.set(scale, scale, scale);

                // 重新居中
                model.position.sub(center.multiplyScalar(scale));
                model.position.y -= box.min.y * scale; // 让模型底部接触地面

                scene.add(model);
                loadingText.style.display = 'none';

                // 调整相机位置以适应模型
                controls.target.copy(new THREE.Vector3(0, 0, 0));
                camera.position.set(maxDim * 2, maxDim, maxDim * 2);
                controls.update();

            },
            function (xhr) {
                // 加载进度
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            function (error) {
                // 错误处理
                console.error('加载失败', error);
                loadingText.innerHTML = `加载失败<br>可能是跨域限制 (CORS)<br>请尝试使用支持 CORS 的链接`;
            }
        );

        // 6. 渲染循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 7. 窗口自适应
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
